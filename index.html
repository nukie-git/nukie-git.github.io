<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https://visitor-counter.nukie.workers.dev; img-src 'self' data:; font-src 'self';">
    <meta name="description" content="nukie's personal website is coming soon. Stay tuned!">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>nukie's personal site - Under Construction</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent: #8B1A1A;
            --accent-hover: #6e1414;
            --highlight: #8B1A1A;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(139, 26, 26, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 26, 26, 0.06) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08),
                0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border-top: 8px solid var(--highlight);
            position: relative;
        }

        .container::after {
            content: '';
            position: absolute;
            top: -8px;
            right: 0;
            width: 30%;
            height: 8px;
            background-color: #1a1a1a;
            border-top-right-radius: 12px;
        }

        .logo-container {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 800;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 3rem;
        }

        .countdown-item {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            min-width: 85px;
            border: 1px solid var(--border-color);
        }

        .countdown-number {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .countdown-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-top: 5px;
            font-weight: 600;
        }

        .notify-form {
            display: flex;
            gap: 10px;
            max-width: 450px;
            margin: 0 auto 3rem auto;
            width: 100%;
        }

        .notify-form input[type="email"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .notify-form input[type="email"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.15);
        }

        .notify-form button {
            padding: 12px 24px;
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .notify-form button:hover {
            background-color: var(--accent-hover);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .social-links a:hover {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .countdown {
                gap: 8px;
            }

            .countdown-item {
                min-width: 65px;
                padding: 10px;
            }

            .countdown-number {
                font-size: 1.5rem;
            }

            .notify-form {
                flex-direction: column;
            }

            .notify-form button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo-container">
            <img src="favicon.png" alt="skinny devil logo" class="logo-img">
        </div>

        <h1>We're building something exciting</h1>
        <p>Our website is currently under construction. We are working hard to deliver the best experience possible.
            Stay tuned!</p>

        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Mins</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Secs</span>
            </div>
        </div>

        <!-- TEMPORARILY HIDDEN
        <form class="notify-form" onsubmit="event.preventDefault(); alert('Thank you! We will notify you.');">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Notify Me</button>
        </form>
        -->

        <div class="social-links">
            <a href="https://x.com/pnugraha" target="_blank" rel="noopener noreferrer">Twitter</a>
            <a href="https://threads.com/@nukie.jpg" target="_blank" rel="noopener noreferrer">Threads</a>
            <a href="https://github.com/nukie-git" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://linkedin.com/in/pnugraha" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
    </div>

    <script>
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").textContent = String(days).padStart(2, '0');
            document.getElementById("hours").textContent = String(hours).padStart(2, '0');
            document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
            document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');

            if (distance < 0) {
                clearInterval(countdownInterval);
                ["days","hours","minutes","seconds"].forEach(id => document.getElementById(id).textContent = "00");
            }
        }

        const countdownInterval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

  <span id="visitor-pill" style="display:inline-block;background:rgba(255,255,255,0.9);padding:4px 14px;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,0.12);white-space:nowrap;">

<script>
(async () => {
  try {
    const res  = await fetch("https://visitor-counter.nukie.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ page: "index_nukie" })
    });
    const data = await res.json();
    document.getElementById("visitor-total").textContent  = data.total.toLocaleString();
    document.getElementById("visitor-unique").textContent = data.unique.toLocaleString();
  } catch (e) {
    // Worker unreachable - dashes remain
  }
})();
</script>

</body>

</html>
